<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LIFT">
<title>LIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --bg:#0A0A0B;--card:#131316;--card2:#1C1C21;--border:rgba(255,255,255,0.07);
  --text:#F0F0F5;--muted:#606070;--muted2:#888898;--green:#34D399;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* ── AUTH SCREEN ── */
#auth-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px;}
#auth-screen.hidden{display:none;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:6px;margin-bottom:6px;line-height:1;}
.auth-tagline{font-size:12px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:40px;}
.auth-tabs{display:flex;background:var(--card);border-radius:12px;padding:3px;margin-bottom:24px;width:100%;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:700;border-radius:9px;cursor:pointer;color:var(--muted2);transition:all .2s;}
.auth-tab.active{background:var(--card2);color:var(--text);}
.auth-form{width:100%;display:flex;flex-direction:column;gap:12px;}
.auth-inp{background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Manrope',sans-serif;font-size:15px;font-weight:600;padding:14px 16px;width:100%;-webkit-appearance:none;}
.auth-inp:focus{outline:none;border-color:rgba(255,255,255,0.2);}
.auth-inp::placeholder{color:var(--muted);}
.auth-btn{width:100%;padding:16px;background:var(--green);color:#000;font-weight:800;font-size:15px;border:none;border-radius:13px;cursor:pointer;font-family:'Manrope',sans-serif;margin-top:4px;}
.auth-btn:active{opacity:.85;}
.auth-err{font-size:12px;color:#FF4500;text-align:center;min-height:18px;font-weight:600;}
.auth-loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted2);font-size:13px;font-weight:600;margin-top:12px;}

/* ── SYNC INDICATOR ── */
#sync-dot{position:fixed;top:calc(var(--safe-top) + 6px);right:14px;width:7px;height:7px;border-radius:50%;background:#34D399;z-index:999;opacity:0;transition:opacity .3s;}
#sync-dot.show{opacity:1;}
#sync-dot.error{background:#FF4500;}

/* ── MAIN APP ── */
#app{height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-ms-overflow-style:none;scrollbar-width:none;padding-bottom:calc(72px + var(--safe-bot));padding-top:calc(var(--safe-top) + 8px);display:none;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.view::-webkit-scrollbar{display:none;}
.view.visible{display:block;}
.view.active{transform:translateX(0) !important;}
.view.from-right{transform:translateX(100%);}
.view.from-left{transform:translateX(-100%);}
.view.to-left{transform:translateX(-30%);}
.view.to-right{transform:translateX(100%);}
.view.animating{transition:transform .32s cubic-bezier(.4,0,.2,1);}

/* NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;height:calc(60px + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(10,10,11,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;}
.ni{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;}
.ni svg{width:21px;height:21px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.ni span{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;transition:color .2s;}
.ni.on svg{stroke:var(--nav-accent,#FF4500);}
.ni.on span{color:var(--nav-accent,#FF4500);}
.bb{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
.sec-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}

/* DASHBOARD */
.dash-hdr{padding:16px 18px 0;}
.greeting{font-size:11px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.today-date{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1.1;margin-top:1px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:14px 18px 0;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 8px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.nw-wrap{padding:14px 18px 0;}
.nw-card{border-radius:20px;padding:20px 22px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;}
.nw-card:active{transform:scale(0.97);}
.nw-card::before{content:'';position:absolute;top:-20px;right:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.07);}
.nw-card::after{content:'';position:absolute;bottom:-40px;right:30px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,0.04);}
.nw-tag{display:inline-flex;align-items:center;background:rgba(0,0,0,0.22);border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-bottom:9px;}
.nw-name{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:2px;line-height:.95;color:#fff;}
.nw-muscles{font-size:12px;color:rgba(255,255,255,0.65);font-weight:600;margin-top:5px;}
.nw-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:15px;}
.nw-excount{font-size:12px;color:rgba(255,255,255,0.65);font-weight:600;}
.nw-btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.28);color:#fff;border-radius:50px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;}
.rec-wrap{padding:14px 18px 0;}
.sess-item{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px;}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sess-info{flex:1;min-width:0;}
.sess-name{font-weight:700;font-size:13px;}
.sess-meta{font-size:11px;color:var(--muted2);margin-top:1px;}
.sess-right{text-align:right;flex-shrink:0;}
.sess-dur{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1;}
.sess-vol{font-size:10px;color:var(--muted2);margin-top:1px;}
.empty-msg{padding:28px 0;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;}
.month-banner{margin:14px 18px 0;background:linear-gradient(135deg,#1a1a22,#222230);border:1px solid rgba(255,183,0,0.3);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.month-banner-text{flex:1;}
.month-banner-title{font-weight:800;font-size:13px;color:#FFB700;}
.month-banner-sub{font-size:11px;color:var(--muted2);margin-top:2px;}
.month-banner-btn{background:#FFB700;color:#000;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:800;flex-shrink:0;}

/* WORKOUT OVERLAY */
#workout-overlay{position:absolute;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);}
#workout-overlay.open{display:flex;transform:translateY(0);}
.wo-hdr{padding:calc(var(--safe-top) + 13px) 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.wo-hdr-left{flex:1;}
.wo-type-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:2px;}
.wo-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:1.5px;line-height:1;}
.wo-hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
.wo-timer{font-family:'Bebas Neue',sans-serif;font-size:27px;letter-spacing:2px;color:var(--green);}
.wo-close{width:33px;height:33px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.wo-close svg{width:15px;height:15px;stroke:var(--muted2);fill:none;stroke-width:2;stroke-linecap:round;}
.wo-body{flex:1;overflow-y:auto;padding:13px 18px;}
.wo-body::-webkit-scrollbar{display:none;}
.wo-finish-bar{padding:12px 18px calc(var(--safe-bot) + 12px);border-top:1px solid var(--border);flex-shrink:0;}
.finish-btn{width:100%;padding:15px;background:var(--green);color:#000;font-weight:800;font-size:15px;border:none;border-radius:14px;cursor:pointer;font-family:'Manrope',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.finish-btn svg{width:17px;height:17px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ACTION SHEET */
.action-sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:500;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;}
.action-sheet{background:#1C1C21;border-radius:20px 20px 0 0;width:100%;padding:8px 12px calc(var(--safe-bot) + 12px);}
.as-title{font-size:12px;color:var(--muted2);font-weight:700;text-align:center;padding:10px 0 6px;text-transform:uppercase;letter-spacing:.8px;}
.as-btn{display:flex;align-items:center;gap:12px;padding:15px 14px;border-radius:14px;cursor:pointer;font-size:16px;font-weight:700;margin-bottom:4px;-webkit-user-select:none;user-select:none;}
.as-btn:active{opacity:.7;}
.as-btn svg{width:20px;height:20px;flex-shrink:0;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.as-btn.danger{color:#FF4500;} .as-btn.danger svg{stroke:#FF4500;}
.as-btn.warn{color:#FFB700;} .as-btn.warn svg{stroke:#FFB700;}
.as-btn.ok{color:#34D399;} .as-btn.ok svg{stroke:#34D399;}
.as-cancel{text-align:center;padding:14px;font-size:16px;font-weight:800;color:var(--text);cursor:pointer;border-radius:14px;background:var(--card2);margin-top:6px;-webkit-user-select:none;user-select:none;}
.as-cancel:active{opacity:.7;}

/* PAUSE OVERLAY */
.pause-overlay{display:none;position:absolute;inset:0;background:rgba(10,10,11,0.95);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.pause-overlay.show{display:flex;}
.pause-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:#FFB700;}
.pause-time{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--muted2);}
.pause-resume-btn{margin-top:10px;padding:16px 48px;background:#FFB700;color:#000;font-weight:800;font-size:16px;border:none;border-radius:50px;cursor:pointer;font-family:'Manrope',sans-serif;display:flex;align-items:center;gap:8px;}
.wo-pause-btn{width:33px;height:33px;border-radius:50%;background:rgba(255,183,0,0.12);border:1px solid rgba(255,183,0,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.wo-pause-btn svg{width:14px;height:14px;stroke:#FFB700;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* EXERCISE CARDS */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:15px;margin-bottom:11px;overflow:hidden;}
.ex-hdr{display:flex;align-items:flex-start;gap:9px;padding:11px 13px 9px;}
.ex-hdr-inputs{flex:1;display:flex;flex-direction:column;gap:5px;}
.ex-name-inp{background:transparent;border:none;color:var(--text);font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;width:100%;padding:0;}
.ex-name-inp:focus{outline:none;}
.ex-name-inp::placeholder{color:var(--muted);}
.ex-meta-row{display:flex;align-items:center;gap:5px;}
.ex-meta-label{font-size:10px;color:var(--muted2);font-weight:600;flex-shrink:0;}
.ex-meta-inp{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--muted2);font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;text-align:center;padding:3px 5px;width:40px;-webkit-appearance:none;}
.ex-meta-inp:focus{outline:none;border-color:rgba(255,255,255,0.18);color:var(--text);}
.ex-meta-reps{width:50px;}
.ex-meta-sep{font-size:10px;color:var(--muted);}
.ex-prog-num{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px;flex-shrink:0;margin-top:1px;}
.ex-del-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.45;margin-top:3px;}
.ex-del-btn svg{width:14px;height:14px;stroke:#FF4500;fill:none;stroke-width:2;stroke-linecap:round;}
.ex-sets{padding:0 13px 7px;}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.set-num{font-size:11px;font-weight:700;color:var(--muted);width:15px;flex-shrink:0;text-align:center;}
.set-inp{background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Manrope',sans-serif;font-weight:600;font-size:14px;text-align:center;padding:10px 2px;flex:1;-webkit-appearance:none;min-width:0;}
.set-inp:focus{outline:none;border-color:rgba(255,255,255,0.2);}
.set-inp::placeholder{color:var(--muted);}
.set-sep{font-size:11px;color:var(--muted);font-weight:700;flex-shrink:0;}
.set-done{width:36px;height:36px;border-radius:9px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.set-done.checked{background:var(--green);border-color:var(--green);}
.set-done svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.set-del{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;opacity:.4;}
.set-del svg{width:12px;height:12px;stroke:var(--muted2);fill:none;stroke-width:2;stroke-linecap:round;}
.add-set-btn{display:flex;align-items:center;gap:6px;margin:1px 13px 11px;padding:9px 12px;background:var(--card2);border:1px dashed rgba(255,255,255,0.08);border-radius:10px;cursor:pointer;color:var(--muted2);font-size:12px;font-weight:700;}
.add-set-btn svg,.add-ex-btn svg{width:13px;height:13px;stroke:var(--muted2);fill:none;stroke-width:2.5;stroke-linecap:round;}
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:4px 0 20px;padding:14px;background:var(--card);border:1px dashed rgba(255,255,255,0.1);border-radius:14px;cursor:pointer;color:var(--muted2);font-size:13px;font-weight:700;}

/* HISTORY */
.view-hdr{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;}
.view-hdr h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1.5px;}
#hist-list{padding:0 18px;}
.hist-sess{background:var(--card);border:1px solid var(--border);border-radius:15px;margin-bottom:9px;overflow:hidden;}
.hist-sess-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;}
.hist-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.hist-info{flex:1;min-width:0;}
.hist-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-date{font-size:11px;color:var(--muted2);margin-top:1px;}
.hist-right{text-align:right;flex-shrink:0;}
.hist-dur{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1;}
.hist-vol{font-size:10px;color:var(--muted2);margin-top:1px;}
.hist-detail{display:none;padding:4px 14px 12px;border-top:1px solid var(--border);}
.hist-detail.open{display:block;}
.hist-ex-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.hist-ex-row:last-child{border-bottom:none;}
.hist-ex-name{font-size:12px;font-weight:600;}
.hist-ex-sets{font-size:11px;color:var(--muted2);text-align:right;max-width:55%;line-height:1.6;}

/* PROGRESS */
.month-filter{padding:0 18px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
.month-filter::-webkit-scrollbar{display:none;}
.mf-pill{flex-shrink:0;padding:5px 13px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;color:var(--muted2);cursor:pointer;transition:all .15s;}
.mf-pill.active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:var(--text);}
.prog-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 18px 12px;}
.ps-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center;}
.ps-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
.ps-lbl{font-size:9px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.prog-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:2px 18px 8px;}
.prog-grid{padding:0 18px;display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 11px 9px;overflow:hidden;}
.prog-card-name{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;}
.prog-card-pr{font-family:'Bebas Neue',sans-serif;font-size:25px;letter-spacing:1px;line-height:1;}
.prog-card-sub{font-size:9px;color:var(--muted2);margin-top:1px;}
.prog-card-delta{font-size:10px;font-weight:700;margin-top:3px;}
.mini-chart{margin-top:7px;width:100%;overflow:visible;}
.pdf-btn{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted2);flex-shrink:0;}
.pdf-btn svg{width:13px;height:13px;stroke:var(--muted2);fill:none;stroke-width:2;stroke-linecap:round;}
.no-data{color:var(--muted);font-size:13px;text-align:center;padding:40px 18px;line-height:1.8;}

/* SETTINGS */
.sett-section{padding:0 18px 20px;}
.sett-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:10px;}
.sett-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:13px;cursor:pointer;}
.sett-row:last-child{border-bottom:none;}
.sett-row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sett-row-icon svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sett-row-info{flex:1;}
.sett-row-title{font-weight:700;font-size:14px;}
.sett-row-sub{font-size:11px;color:var(--muted2);margin-top:2px;}
.sett-row-right{color:var(--muted);font-size:12px;font-weight:700;flex-shrink:0;}
.sett-row-right svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;}
.split-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.split-pill{padding:9px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;font-size:12px;font-weight:700;color:var(--muted2);cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;}
.split-pill.selected{color:var(--text);border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.07);}
.split-pill:active{opacity:.7;transform:scale(.96);}
.backup-note{background:rgba(255,183,0,0.07);border:1px solid rgba(255,183,0,0.2);border-radius:12px;padding:12px 14px;font-size:12px;color:rgba(255,183,0,0.9);line-height:1.6;margin-top:10px;}

.cust-day-meta{font-size:11px;color:var(--muted2);flex-shrink:0;}

.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;flex-shrink:0;}
.color-dot:active{transform:scale(.88);}
.color-dot.sel{box-shadow:0 0 0 3px rgba(255,255,255,0.4);}
.cust-ex-list{margin-top:12px;}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── FIREBASE CONFIG ──────────────────────────────────────────
// ⚠️  Vul hieronder je eigen apiKey en appId in uit Firebase Console
// Ga naar: console.firebase.google.com → liftapp-7ca5d → Projectinstellingen → Jouw apps
const firebaseConfig = {
  apiKey:            "AIzaSyCBpky4kx0ufp0XBSKHMIkegAh-fTQzguk",
  authDomain:        "liftapp-7ca5d.firebaseapp.com",
  projectId:         "liftapp-7ca5d",
  storageBucket:     "liftapp-7ca5d.firebasestorage.app",
  messagingSenderId: "126897653312",
  appId:             "1:126897653312:web:b9c51c62aa810a8f5541a5"
};

const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);

// Expose to global scope so non-module functions can use them
window._auth = auth; window._db = db;
window._signOut = () => signOut(auth);
window._createUser = (e,p) => createUserWithEmailAndPassword(auth,e,p);
window._signIn     = (e,p) => signInWithEmailAndPassword(auth,e,p);
window._getDoc = (path) => getDoc(doc(db, path));
window._setDoc = (path, data) => setDoc(doc(db, path), data);

// ── AUTH STATE ───────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    window._currentUID = user.uid;
    window._currentEmail = user.email;
    // Load data from Firestore
    try {
      const snap = await getDoc(doc(db, 'users', user.uid, 'data', 'state'));
      if (snap.exists()) {
        const data = snap.data();
        window.STATE = data;
        if (!window.STATE.customSplit) window.STATE.customSplit = window.defaultCustomSplit();
      } else {
        window.STATE = window.freshState();
      }
    } catch(e) {
      // Offline: use cached localStorage
      const cached = localStorage.getItem('lift_cache_'+user.uid);
      window.STATE = cached ? JSON.parse(cached) : window.freshState();
    }
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    window.initApp();
  } else {
    window._currentUID = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').classList.remove('hidden');
  }
});
</script>

// ═══════════════════════════════════════════════════════════════
// STATE

window.defaultCustomSplit = function(){
  return {label:'Mijn Split',days:[{id:'custom_0',name:'Dag A',short:'Dag A',label:'Mijn eigen dag A',color:'#FF4500',exercises:[{name:'',targetSets:3,targetReps:'8-12'}]}]};

window.freshState = function(){
  const t={};
  SPLIT_PRESETS.ppla.days.forEach(d=>{t[d.id]=d.exercises.map(e=>({name:e.name,targetSets:e.targetSets,targetReps:e.targetReps}));});
  return {sessions:[],splitId:'ppla',templates:t,customSplit:window.defaultCustomSplit(),lastBackup:null};
};

window.STATE = window.freshState();

// Debounced Firestore save
let saveTimer = null;
function saveState(){
  // Always cache locally per user
  if(window._currentUID) localStorage.setItem('lift_cache_'+window._currentUID, JSON.stringify(STATE));
  // Debounce cloud write by 1.5s to batch rapid edits
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    if(!window._currentUID || !window._setDoc) return;
    showSync();
    try {
      await window._setDoc('users/'+window._currentUID+'/data/state', STATE);
      showSync(false);
    } catch(e){
      showSync(false, true);
    }
  }, 1500);
}

function showSync(on=true, err=false){
  const d=document.getElementById('sync-dot');
  if(!d)return;
  d.classList.toggle('show', on||err);
  d.classList.toggle('error', err);
}

// ═══════════════════════════════════════════════════════════════
// AUTH UI
// ═══════════════════════════════════════════════════════════════
let authMode = 'login';
function switchTab(mode){
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-register').classList.toggle('active', mode==='register');
  document.getElementById('auth-submit').textContent = mode==='login' ? 'Inloggen' : 'Account aanmaken';
  document.getElementById('auth-err').textContent = '';
}
async function doAuth(){
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-err');
  const btn   = document.getElementById('auth-submit');
  if(!email||!pass){errEl.textContent='Vul e-mail en wachtwoord in.';return;}
  btn.textContent = '...';
  btn.disabled = true;
  errEl.textContent = '';
  try {
    if(authMode==='login') await window._signIn(email, pass);
    else                   await window._createUser(email, pass);
  } catch(e){
    const msgs = {
      'auth/invalid-credential':'Onjuist e-mail of wachtwoord.',
      'auth/user-not-found':'Geen account gevonden.',
      'auth/wrong-password':'Onjuist wachtwoord.',
      'auth/email-already-in-use':'Dit e-mailadres is al in gebruik.',
      'auth/weak-password':'Wachtwoord moet minimaal 6 tekens zijn.',
      'auth/invalid-email':'Ongeldig e-mailadres.',
      'auth/network-request-failed':'Geen internetverbinding.'
    };
    errEl.textContent = msgs[e.code] || e.message;
    btn.textContent = authMode==='login'?'Inloggen':'Account aanmaken';
    btn.disabled = false;
  }
}
// Enter key on password field
document.getElementById('auth-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doAuth(); });

function dc(o){return JSON.parse(JSON.stringify(o));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getSplit(){return STATE.splitId==='custom'?STATE.customSplit:SPLIT_PRESETS[STATE.splitId];}
function getRotation(){return getSplit().days.map(d=>d.id);}
function getDayDef(dayId){return getSplit().days.find(d=>d.id===dayId)||getSplit().days[0];}
function getNext(){const s=STATE.sessions,rot=getRotation();if(!s.length)return rot[0];const idx=rot.indexOf(s[s.length-1].type);return rot[(idx>=0?idx+1:1)%rot.length];}
function totalVol(sess){let v=0;(sess.exercises||[]).forEach(e=>e.sets.forEach(st=>{if(st.weight&&st.reps)v+=parseFloat(st.weight)*parseInt(st.reps);}));return Math.round(v);}
function fmtDur(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function fmtDate(ts){const d=new Date(ts);return`${['Zo','Ma','Di','Wo','Do','Vr','Za'][d.getDay()]} ${d.getDate()} ${'jan,feb,mrt,apr,mei,jun,jul,aug,sep,okt,nov,dec'.split(',')[d.getMonth()]}`;}
function fmtDateFull(ts){const d=new Date(ts);return`${['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'][d.getDay()]} ${d.getDate()} ${'januari,februari,maart,april,mei,juni,juli,augustus,september,oktober,november,december'.split(',')[d.getMonth()]} ${d.getFullYear()}`;}
function fmtMonthLabel(ym){const[y,m]=ym.split('-');return`${'jan,feb,mrt,apr,mei,jun,jul,aug,sep,okt,nov,dec'.split(',')[parseInt(m)-1]} ${y}`;}
function getStreak(){if(!STATE.sessions.length)return 0;let s=0,p=new Date();p.setHours(0,0,0,0);for(const x of [...STATE.sessions].sort((a,b)=>b.date-a.date)){const dd=new Date(x.date);dd.setHours(0,0,0,0);if((p-dd)/86400000<=1){s++;p=dd;}else break;}return s;}
function getTotalStr(){let t=0;STATE.sessions.forEach(s=>t+=totalVol(s));if(!t)return'0 kg';return t>9999?`${(t/1000).toFixed(1)}t`:`${t.toLocaleString()} kg`;}
function getMonths(){const set=new Set();STATE.sessions.forEach(s=>{const d=new Date(s.date);set.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);});return[...set].sort().reverse();}
function sessionsForMonth(ym){if(!ym||ym==='__all__')return STATE.sessions;return STATE.sessions.filter(s=>{const d=new Date(s.date);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===ym;});}
function isFirstOfMonth(){return new Date().getDate()===1;}
function getPrevMonthKey(){const n=new Date(),d=new Date(n.getFullYear(),n.getMonth()-1,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function accentColor(){return getDayDef(getNext()).color||'#FF4500';}

function showToast(msg,color){
  let t=document.getElementById('lift-toast');
  if(!t){t=document.createElement('div');t.id='lift-toast';t.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1C1C21;border:1px solid rgba(255,255,255,0.1);color:#F0F0F5;padding:10px 18px;border-radius:50px;font-family:Manrope,sans-serif;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;z-index:9999;';document.body.appendChild(t);}
  t.textContent=msg;
  t.style.borderColor=(color||'rgba(255,255,255,0.1)');
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._tm);t._tm=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2200);
}

// NAV + SWIPE
// ═══════════════════════════════════════════════════════════════
const VIEW_ORDER=['dash','hist','prog','sett'];
let currentView='dash',isAnimating=false;
function getEl(v){return document.getElementById('v-'+v);}

function nav(v,direction){
  if(v===currentView||isAnimating)return;
  isAnimating=true;
  const from=currentView;currentView=v;
  const fromEl=getEl(from),toEl=getEl(v);
  const goRight=direction==='right'||(!direction&&VIEW_ORDER.indexOf(v)>VIEW_ORDER.indexOf(from));
  if(v==='dash')renderDash();else if(v==='hist')renderHist();else if(v==='prog')renderProg();else if(v==='sett')renderSett();
  toEl.className='view visible '+(goRight?'from-right':'from-left');
  fromEl.className='view visible active';
  toEl.getBoundingClientRect();
  toEl.className='view visible animating active';
  fromEl.className='view visible animating '+(goRight?'to-left':'to-right');
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('on'));
  document.getElementById('ni-'+v).classList.add('on');
  document.querySelector('.bnav').style.setProperty('--nav-accent',accentColor());
  setTimeout(()=>{fromEl.className='view';toEl.className='view visible active';isAnimating=false;},340);
}

(function setupSwipe(){
  let sx=0,sy=0,tracking=false;
  document.getElementById('app').addEventListener('touchstart',e=>{
    if(document.getElementById('workout-overlay').classList.contains('open'))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;
  },{passive:true});
  document.getElementById('app').addEventListener('touchend',e=>{
    if(!tracking)return;tracking=false;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx)*0.8)return;
    const idx=VIEW_ORDER.indexOf(currentView);
    if(dx<0&&idx<VIEW_ORDER.length-1)nav(VIEW_ORDER[idx+1],'right');
    else if(dx>0&&idx>0)nav(VIEW_ORDER[idx-1],'left');
  },{passive:true});
})();
(function setupWOSwipe(){
  let sy=0,tracking=false;
  const ov=document.getElementById('workout-overlay');
  ov.addEventListener('touchstart',e=>{if(e.target.closest('.wo-body'))return;sy=e.touches[0].clientY;tracking=true;},{passive:true});
  ov.addEventListener('touchend',e=>{if(!tracking)return;tracking=false;if(e.changedTouches[0].clientY-sy>70)showWOSheet();},{passive:true});
})();

let activeWO=null,timerInt=null;

function startWorkout(dayId){
  const dd=getDayDef(dayId),tmpl=STATE.templates[dayId]||dd.exercises;
  activeWO={dayId,startTime:Date.now(),pausedDuration:0,exercises:dc(tmpl).map(e=>({name:e.name,targetSets:e.targetSets,targetReps:e.targetReps,sets:[]}))};
  document.getElementById('wo-badge').textContent=dd.label;
  const t=document.getElementById('wo-title');t.textContent=dd.name.toUpperCase();t.style.color=dd.color;
  const ov=document.getElementById('workout-overlay');
  ov.style.display='flex';requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('open')));
  renderWOBody();
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!activeWO||activeWO.paused)return;
    const el=document.getElementById('wo-timer');
    if(el)el.textContent=fmtDur(Math.floor((Date.now()-activeWO.startTime-(activeWO.pausedDuration||0))/1000));
  },1000);
}

function showActionSheet(title,buttons){
  document.getElementById('action-sheet-root').innerHTML=`
    <div class="action-sheet-overlay" id="as-overlay" onclick="closeActionSheet(event)">
      <div class="action-sheet">
        ${title?`<div class="as-title">${title}</div>`:''}
        ${buttons.map(b=>`<div class="as-btn ${b.style||''}" onclick="(${b.action})();closeActionSheet()">${b.icon?`<svg viewBox="0 0 24 24">${b.icon}</svg>`:''} ${b.label}</div>`).join('')}
        <div class="as-cancel" onclick="closeActionSheet()">Annuleren</div>
      </div>
    </div>`;
}
function closeActionSheet(e){if(e&&e.target!==document.getElementById('as-overlay'))return;document.getElementById('action-sheet-root').innerHTML='';}

function showWOSheet(){
  const isPaused=activeWO&&activeWO.paused;
  showActionSheet('Workout opties',[
    {label:isPaused?'Doorgaan':'Pauzeren',style:'warn',icon:isPaused?'<polygon points="5 3 19 12 5 21 5 3"/>':'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>',action:'togglePause'},
    {label:'Workout afronden',style:'ok',icon:'<polyline points="20 6 9 17 4 12"/>',action:'finishWorkout'},
    {label:'Workout annuleren',style:'danger',icon:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',action:'closeWorkout'}
  ]);
}

function togglePause(){
  if(!activeWO)return;closeActionSheet();
  if(activeWO.paused){
    activeWO.pausedDuration+=(Date.now()-activeWO.pausedAt);delete activeWO.paused;delete activeWO.pausedAt;
    document.getElementById('pause-overlay').classList.remove('show');
    const ic=document.getElementById('pause-icon');if(ic)ic.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    activeWO.paused=true;activeWO.pausedAt=Date.now();
    document.getElementById('pause-overlay').classList.add('show');
    const ic=document.getElementById('pause-icon');if(ic)ic.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
    const el=document.getElementById('pause-elapsed');
    if(el)el.textContent=fmtDur(Math.floor((Date.now()-activeWO.startTime-(activeWO.pausedDuration||0))/1000));
  }
}
function closeWorkout(){
  closeActionSheet();
  const ov=document.getElementById('workout-overlay');
  ov.classList.remove('open');setTimeout(()=>{ov.style.display='none';},350);
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('pause-overlay').classList.remove('show');
  activeWO=null;
}
function finishWorkout(){
  if(!activeWO)return;closeActionSheet();
  if(activeWO.paused)activeWO.pausedDuration+=(Date.now()-activeWO.pausedAt);
  const dur=Math.floor((Date.now()-activeWO.startTime-(activeWO.pausedDuration||0))/1000);
  STATE.sessions.push({id:Date.now(),type:activeWO.dayId,date:Date.now(),duration:dur,exercises:dc(activeWO.exercises)});
  STATE.templates[activeWO.dayId]=activeWO.exercises.map(e=>({name:e.name,targetSets:e.targetSets,targetReps:e.targetReps}));
  saveState();closeWorkout();nav('dash');
}

        </div>
      </div>
      <div class="ex-sets">${ex.sets.map((s,si)=>`
        <div class="set-row" id="sr-${ei}-${si}">
          <span class="set-num">${si+1}</span>
          <input class="set-inp" type="number" inputmode="decimal" placeholder="kg" value="${s.weight||''}" onchange="updSet(${ei},${si},'weight',this.value)">
          <span class="set-sep">&times;</span>
          <input class="set-inp" type="number" inputmode="numeric" placeholder="reps" value="${s.reps||''}" onchange="updSet(${ei},${si},'reps',this.value)">
          <div class="set-done${s.done?' checked':''}" onclick="toggleSet(${ei},${si})"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>

        </div>`).join('')}</div>
      <div class="add-set-btn" onclick="addSet(${ei})"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Set toevoegen</div>
    </div>`;

}
function updEx(ei,f,v){if(!activeWO)return;if(f==='targetSets')v=parseInt(v)||1;activeWO.exercises[ei][f]=v;const ex=activeWO.exercises[ei];const done=ex.sets.filter(s=>s.done).length;const n=document.querySelector(`#ex-${ei} .ex-prog-num`);if(n){n.textContent=`${done}/${ex.targetSets}`;n.style.color=done>0&&done>=parseInt(ex.targetSets)?'#34D399':getDayDef(activeWO.dayId).color;}}
function addExercise(){activeWO.exercises.push({name:'',targetSets:3,targetReps:'8-12',sets:[]});renderWOBody();setTimeout(()=>{const cs=document.querySelectorAll('.ex-card');const l=cs[cs.length-1];if(l){l.scrollIntoView({behavior:'smooth',block:'center'});const i=l.querySelector('.ex-name-inp');if(i)setTimeout(()=>i.focus(),300);}},80);}
function delEx(ei){if(activeWO.exercises.length<=1){showToast('Minimaal 1 oefening nodig');return;}activeWO.exercises.splice(ei,1);renderWOBody();}
function addSet(ei){const ex=activeWO.exercises[ei];const prev=ex.sets[ex.sets.length-1];ex.sets.push({weight:prev?prev.weight:'',reps:prev?prev.reps:'',done:false});renderWOBody();setTimeout(()=>{const c=document.getElementById(`ex-${ei}`);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});},60);}
function delSet(ei,si){activeWO.exercises[ei].sets.splice(si,1);renderWOBody();}
function updSet(ei,si,f,v){if(activeWO)activeWO.exercises[ei].sets[si][f]=v;}
function toggleSet(ei,si){const s=activeWO.exercises[ei].sets[si];const row=document.getElementById(`sr-${ei}-${si}`);if(row){const inp=row.querySelectorAll('input');if(inp[0].value)s.weight=inp[0].value;if(inp[1].value)s.reps=inp[1].value;}s.done=!s.done;renderWOBody();}

// PROGRESS
// ═══════════════════════════════════════════════════════════════
let progMonth=null;
function renderProg(){
  const months=getMonths();
  if(!progMonth){const n=new Date();const cur=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;progMonth=months.includes(cur)?cur:(months[0]||'__all__');}
  const filtered=sessionsForMonth(progMonth);
  const allExNames=[...new Set(STATE.sessions.flatMap(s=>s.exercises.map(e=>e.name)).filter(Boolean))];
  document.getElementById('v-prog').innerHTML=`
    <div class="view-hdr"><h1 class="bb">Progressie</h1>
      <div class="pdf-btn" onclick="exportPDF('${progMonth}')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>PDF</div>
    </div>
    <div class="month-filter">
      <div class="mf-pill${progMonth==='__all__'?' active':''}" onclick="progMonth='__all__';renderProg()">Alles</div>
      ${months.map(m=>`<div class="mf-pill${progMonth===m?' active':''}" onclick="progMonth='${m}';renderProg()">${fmtMonthLabel(m)}</div>`).join('')}
    </div>
    ${filtered.length?`<div class="prog-summary">
      <div class="ps-card"><div class="ps-val bb">${filtered.length}</div><div class="ps-lbl">Sessies</div></div>
      <div class="ps-card"><div class="ps-val bb">${filtered.reduce((a,s)=>a+Math.floor(s.duration/60),0)}m</div><div class="ps-lbl">Tijd</div></div>
      <div class="ps-card"><div class="ps-val bb" style="font-size:${filtered.reduce((a,s)=>a+totalVol(s),0)>9999?'14px':'20px'}">${filtered.reduce((a,s)=>a+totalVol(s),0)>9999?(filtered.reduce((a,s)=>a+totalVol(s),0)/1000).toFixed(1)+'t':filtered.reduce((a,s)=>a+totalVol(s),0).toLocaleString()+'kg'}</div><div class="ps-lbl">Volume</div></div>
    </div>`:''}
    ${getSplit().days.map(dd=>{
      const exNames=[...new Set(STATE.sessions.filter(s=>s.type===dd.id).flatMap(s=>s.exercises.map(e=>e.name)).filter(Boolean))];
      if(!exNames.length)return'';
      const cards=exNames.map(n=>buildProgCard(n,dd,filtered)).filter(Boolean).join('');
      if(!cards)return'';
      return`<div class="prog-section-label" style="color:${dd.color}">${dd.name.toUpperCase()} · ${dd.short}</div><div class="prog-grid">${cards}</div>`;
    }).join('')}
    ${allExNames.length===0?'<div class="no-data">Log eerst wat sessies! 💪</div>':''}`;
}
function buildProgCard(name,dd,filteredSessions){
  const allData=getExData(name);const filtData=getExDataFrom(name,filteredSessions);
  if(!allData.length)return null;
  const pr=Math.max(...allData.map(d=>d.maxW));
  const last=allData[allData.length-1];
  const diff=allData.length>1?+(last.maxW-allData[allData.length-2].maxW).toFixed(1):null;
  const diffHtml=diff!=null?(diff>0?`<span style="color:#34D399">+${diff}kg</span>`:diff<0?`<span style="color:#FF4500">${diff}kg</span>`:`<span style="color:var(--muted2)">=${diff}kg</span>`):'';
  return`<div class="prog-card">
    <div class="prog-card-name" title="${esc(name)}">${esc(name)}</div>
    <div class="prog-card-pr bb" style="color:${dd.color}">${pr}<span style="font-size:12px;font-family:'Manrope',sans-serif;font-weight:700"> kg</span></div>
    <div class="prog-card-sub">PR · ${filtData.length} sessies</div>
    ${diff!=null?`<div class="prog-card-delta">${diffHtml} vs vorige</div>`:''}
    ${buildMiniChart(filtData.length>=2?filtData:allData.slice(-8),dd.color)}
  </div>`;
}
function getExData(name){return STATE.sessions.map(s=>{const ex=(s.exercises||[]).find(e=>e.name===name);if(!ex)return null;const ws=ex.sets.filter(st=>st.weight).map(st=>parseFloat(st.weight));if(!ws.length)return null;return{date:s.date,maxW:Math.max(...ws)};}).filter(Boolean);}
function getExDataFrom(name,sessions){return sessions.map(s=>{const ex=(s.exercises||[]).find(e=>e.name===name);if(!ex)return null;const ws=ex.sets.filter(st=>st.weight).map(st=>parseFloat(st.weight));if(!ws.length)return null;return{date:s.date,maxW:Math.max(...ws)};}).filter(Boolean);}
function buildMiniChart(data,color){
  if(data.length<2)return data.length===1?`<div style="font-size:9px;color:var(--muted);margin-top:5px">1 meting</div>`:'';
  const W=148,H=42,pt={t:5,r:3,b:5,l:3};const iW=W-pt.l-pt.r,iH=H-pt.t-pt.b;
  const vals=data.map(d=>d.maxW);const minV=Math.min(...vals),maxV=Math.max(...vals),rng=maxV-minV||1;
  const pts=data.map((d,i)=>({x:pt.l+(i/(data.length-1))*iW,y:pt.t+iH-((d.maxW-minV)/rng)*iH}));
  const lp=pts[pts.length-1];const gid=`mg_${Math.random().toString(36).slice(2,7)}`;
  return`<svg class="mini-chart" viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${pt.l},${pt.t+iH} ${pts.map(p=>`${p.x},${p.y}`).join(' ')} ${pt.l+iW},${pt.t+iH}" fill="url(#${gid})"/>
    <polyline points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lp.x}" cy="${lp.y}" r="2.8" fill="${color}"/>
  </svg>`;
}

  ]);
}

function confirmResetData(){
  showActionSheet('Alle data verwijderen',[
    {label:'Ja, verwijder alles',style:'danger',
     icon:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
     action:`function(){STATE=window.freshState();saveState();closeActionSheet();nav('dash');showToast('Data gewist');}`}
  ]);
}

function setSplit(id){
  if(id===STATE.splitId){showToast('Al actief ✓');return;}
  STATE.splitId=id;
  if(id==='custom'){const newT={};STATE.customSplit.days.forEach(d=>{newT[d.id]=STATE.templates[d.id]||d.exercises.map(e=>({name:e.name,targetSets:e.targetSets,targetReps:e.targetReps}));});STATE.templates=newT;}
  else{const newT={};SPLIT_PRESETS[id].days.forEach(d=>{newT[d.id]=STATE.templates[d.id]||d.exercises.map(e=>({name:e.name,targetSets:e.targetSets,targetReps:e.targetReps}));});STATE.templates=newT;}
  saveState();renderSett();renderDash();
  showToast(`✓ ${id==='custom'?'Eigen split':SPLIT_PRESETS[id].label}`,accentColor());
}

// ── CUSTOM SPLIT ─────────────────────────────────────────────

      <div class="cust-day-hdr" onclick="toggleCustDay(${di})">
        <div class="cust-day-dot" style="background:${d.color}"></div>
        <div class="cust-day-name">${esc(d.name)||'Dag '+(di+1)}</div>
        <div class="cust-day-meta">${d.exercises.length} oef.</div>
        <div class="cust-day-chevron" id="cchev-${di}"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
      </div>
      <div class="cust-day-body" id="cbody-${di}">
        <div class="cust-field-row"><div class="cust-field-label">Dag naam</div><input class="cust-field-inp" type="text" placeholder="Bijv. Push" value="${esc(d.name)}" onblur="updCustomDay(${di},'name',this.value)"></div>
        <div class="cust-field-row"><div class="cust-field-label">Omschrijving</div><input class="cust-field-inp" type="text" placeholder="Bijv. Borst · Schouders" value="${esc(d.label)}" onblur="updCustomDay(${di},'label',this.value)"></div>
        <div class="cust-field-row"><div class="cust-field-label">Kleur</div><div class="color-row">${CUSTOM_COLORS.map(c=>`<div class="color-dot${d.color===c?' sel':''}" style="background:${c}" onclick="updCustomDay(${di},'color','${c}')"></div>`).join('')}</div></div>
        <div class="cust-field-row"><div class="cust-field-label" style="margin-bottom:6px">Oefeningen</div>
          <div class="cust-ex-list">${d.exercises.map((ex,ei)=>`
            <div class="cust-ex-row">
              <input class="cust-ex-inp" type="text" placeholder="Naam" value="${esc(ex.name)}" onblur="updCustomEx(${di},${ei},'name',this.value)">
              <input class="cust-ex-inp cust-ex-small" type="number" inputmode="numeric" placeholder="3" value="${ex.targetSets||''}" onblur="updCustomEx(${di},${ei},'targetSets',this.value)" title="Sets">
              <input class="cust-ex-inp cust-ex-small" type="text" placeholder="8-12" value="${esc(ex.targetReps||'')}" onblur="updCustomEx(${di},${ei},'targetReps',this.value)" title="Reps">
              <div class="cust-ex-del" onclick="delCustomEx(${di},${ei})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
            </div>`).join('')}</div>
          <div class="cust-add-ex" onclick="addCustomEx(${di})"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Oefening toevoegen</div>
        </div>
        ${STATE.customSplit.days.length>1?`<div class="cust-del-day" onclick="delCustomDay(${di})"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Dag verwijderen</div>`:''}
      </div>
    </div>`).join('');
}
function toggleCustDay(di){const b=document.getElementById(`cbody-${di}`);const c=document.getElementById(`cchev-${di}`);if(b)b.classList.toggle('open');if(c)c.classList.toggle('open');}
function updCustomLabel(v){STATE.customSplit.label=v||'Mijn Split';saveState();}
function updCustomDay(di,field,val){
  if(field==='color'){STATE.customSplit.days[di].color=val;saveState();const l=document.getElementById('cust-days-list');if(l){l.innerHTML=renderCustomDaysList();openCustDay(di);}return;}
  STATE.customSplit.days[di][field]=val;if(field==='name')STATE.customSplit.days[di].short=val;
  saveState();if(STATE.splitId==='custom')renderDash();
}
function updCustomEx(di,ei,f,v){if(f==='targetSets')v=parseInt(v)||1;STATE.customSplit.days[di].exercises[ei][f]=v;saveState();}
function addCustomEx(di){STATE.customSplit.days[di].exercises.push({name:'',targetSets:3,targetReps:'8-12'});saveState();const l=document.getElementById('cust-days-list');if(l){l.innerHTML=renderCustomDaysList();openCustDay(di);}setTimeout(()=>{const el=document.querySelector(`#cbody-${di} .cust-ex-list`);if(el){const rows=el.querySelectorAll('.cust-ex-row');const last=rows[rows.length-1];if(last){const inp=last.querySelector('input');if(inp)inp.focus();}}},80);}
function delCustomEx(di,ei){if(STATE.customSplit.days[di].exercises.length<=1){showToast('Minimaal 1 oefening');return;}STATE.customSplit.days[di].exercises.splice(ei,1);saveState();const l=document.getElementById('cust-days-list');if(l){l.innerHTML=renderCustomDaysList();openCustDay(di);}}
function addCustomDay(){const idx=STATE.customSplit.days.length;const newId=`custom_${Date.now()}`;STATE.customSplit.days.push({id:newId,name:`Dag ${String.fromCharCode(65+idx%26)}`,short:`Dag ${String.fromCharCode(65+idx%26)}`,label:'Omschrijving',color:CUSTOM_COLORS[idx%CUSTOM_COLORS.length],exercises:[{name:'',targetSets:3,targetReps:'8-12'}]});STATE.templates[newId]=[];saveState();const l=document.getElementById('cust-days-list');if(l){l.innerHTML=renderCustomDaysList();openCustDay(idx);}if(STATE.splitId==='custom')renderDash();}
function delCustomDay(di){if(STATE.customSplit.days.length<=1){showToast('Je hebt minimaal 1 dag nodig');return;}const id=STATE.customSplit.days[di].id;delete STATE.templates[id];STATE.customSplit.days.splice(di,1);saveState();const l=document.getElementById('cust-days-list');if(l)l.innerHTML=renderCustomDaysList();if(STATE.splitId==='custom')renderDash();}
function openCustDay(di){const b=document.getElementById(`cbody-${di}`);const c=document.getElementById(`cchev-${di}`);if(b)b.classList.add('open');if(c)c.classList.add('open');}

// PDF EXPORT
// ═══════════════════════════════════════════════════════════════
function exportPDF(monthKey){
  try{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const isAll=!monthKey||monthKey==='__all__';const monthLabel=isAll?'Alle Tijd':fmtMonthLabel(monthKey);
    const filtered=sessionsForMonth(monthKey);
    const BG=[10,10,11],CARD=[25,25,30],WHITE=[240,240,245],MUTED=[120,120,140];
    doc.setFillColor(...BG);doc.rect(0,0,210,297,'F');
    doc.setFillColor(...CARD);doc.roundedRect(10,8,190,22,4,4,'F');
    doc.setTextColor(...WHITE);doc.setFontSize(20);doc.setFont('helvetica','bold');doc.text('LIFT',16,22);
    doc.setFontSize(10);doc.setTextColor(...MUTED);doc.text(`Progressierapport · ${monthLabel}`,38,22);
    doc.setTextColor(52,211,153);doc.setFontSize(8);doc.text(`${new Date().toLocaleDateString('nl-NL')} · ${window._currentEmail||''}`,152,22);
    const stats=[{l:'Sessies',v:String(filtered.length)},{l:'Volume',v:`${filtered.reduce((a,s)=>a+totalVol(s),0).toLocaleString()} kg`},{l:'Tijd',v:`${filtered.reduce((a,s)=>a+Math.floor(s.duration/60),0)} min`},{l:'All-time',v:`${STATE.sessions.length} sess.`}];
    const sw=44.5;stats.forEach((st,i)=>{doc.setFillColor(...CARD);doc.roundedRect(10+i*(sw+2),33,sw,16,3,3,'F');doc.setTextColor(...WHITE);doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text(st.v,10+i*(sw+2)+sw/2,42,{align:'center'});doc.setFontSize(6.5);doc.setTextColor(...MUTED);doc.text(st.l,10+i*(sw+2)+sw/2,47,{align:'center'});});
    let y=56;
    for(const dd of getSplit().days){
      const exNames=[...new Set(STATE.sessions.filter(s=>s.type===dd.id).flatMap(s=>s.exercises.map(e=>e.name)).filter(Boolean))];if(!exNames.length)continue;
      const rgb=hexToRgb(dd.color);doc.setFillColor(...rgb);doc.roundedRect(10,y,190,8,2,2,'F');doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(`${dd.name.toUpperCase()}  ·  ${dd.short}`,15,y+5.5);y+=11;
      for(const name of exNames){
        const allD=getExData(name);const filtD=getExDataFrom(name,filtered);if(!allD.length)continue;
        const pr=Math.max(...allD.map(d=>d.maxW));const last=allD[allD.length-1];const diff=allD.length>1?+(last.maxW-allD[allD.length-2].maxW).toFixed(1):null;
        if(y>264){doc.addPage();doc.setFillColor(...BG);doc.rect(0,0,210,297,'F');y=15;}
        doc.setFillColor(...CARD);doc.roundedRect(10,y,190,15,3,3,'F');
        doc.setTextColor(...WHITE);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text((name||'').substring(0,30),15,y+6);
        doc.setFontSize(7);doc.setTextColor(...MUTED);doc.text(`${filtD.length} sessies`,15,y+11.5);
        doc.setTextColor(...rgb);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text(`${pr} kg`,108,y+6.5);
        doc.setFontSize(6.5);doc.setTextColor(...MUTED);doc.text('PR',108,y+11.5);
        if(diff!=null){const dc=diff>0?[52,211,153]:diff<0?[255,69,0]:[120,120,140];doc.setFontSize(9);doc.setTextColor(...dc);doc.text(`${diff>=0?'+':''}${diff} kg vs vorige`,145,y+6.5);}
        const sparkData=filtD.length>=2?filtD:allD.slice(-6);
        if(sparkData.length>=2){const sx=170,sy2=y+3,sw2=28,sh=8;const sv=sparkData.map(d=>d.maxW);const smn=Math.min(...sv),smx=Math.max(...sv),srng=smx-smn||1;const spts=sparkData.map((d,i)=>({x:sx+(i/(sparkData.length-1))*sw2,y:sy2+sh-((d.maxW-smn)/srng)*sh}));doc.setDrawColor(...rgb);doc.setLineWidth(0.5);for(let i=0;i<spts.length-1;i++)doc.line(spts[i].x,spts[i].y,spts[i+1].x,spts[i+1].y);spts.forEach((p,i)=>{doc.setFillColor(...rgb);doc.circle(p.x,p.y,i===spts.length-1?0.9:0.4,'F');});}
        y+=18;
      }y+=4;
    }
    doc.setTextColor(...MUTED);doc.setFontSize(7);doc.text(`LIFT App · ${new Date().getFullYear()}`,105,290,{align:'center'});
    doc.save(isAll?'LIFT_alltijd.pdf':`LIFT_${monthKey}.pdf`);
  }catch(err){showToast('PDF export mislukt');console.error(err);}
}
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
